<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>snip — url shortener</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <div class="bg-grid"></div>

  <header>
    <span class="logo">snip<span class="logo-dot">.</span></span>
    <span class="tagline">cut the clutter</span>
  </header>

  <main>
    <!-- Hero shorten form -->
    <section class="hero">
      <h1>long urls,<br><em>snipped.</em></h1>
      <form class="shorten-form" id="shortenForm">
        <div class="input-row">
          <input
            type="url"
            id="urlInput"
            placeholder="https://your-very-long-url.com/goes/here"
            autocomplete="off"
            required
          />
          <button type="submit" id="submitBtn">
            <span class="btn-text">snip</span>
            <span class="btn-loader" >···</span>
          </button>
        </div>
        <p class="form-error" id="formError" ></p>
      </form>
    </section>

    <!-- Result card ( until a URL is created) -->
    <section class="result-card hidden" id="resultCard" >
      <div class="result-header">
        <span class="result-label">your snipped url</span>
        <button class="icon-btn" id="closeResult" title="dismiss">✕</button>
      </div>
      <div class="result-body">
        <a class="short-link" id="shortLink" href="#" target="_blank"></a>
        <button class="copy-btn" id="copyBtn">copy</button>
      </div>
      <div class="result-meta">
        <span id="resultOriginal"></span>
      </div>
    </section>

    <!-- URL list -->
    <section class="list-section">
      <div class="list-header">
        <h2>your snips</h2>
        <button class="refresh-btn" id="refreshBtn" title="refresh">↻</button>
      </div>
      <div class="url-list" id="urlList">
        <p class="empty-state">no snips yet — create one above</p>
      </div>
    </section>
  </main>

  <!-- Edit modal -->
  <div class="modal-backdrop hidden" id="modalBackdrop" >
    <div class="modal" id="editModal">
      <div class="modal-header">
        <span>edit snip</span>
        <button class="icon-btn" id="closeModal">✕</button>
      </div>
      <form id="editForm">
        <label for="editInput">new url</label>
        <input type="url" id="editInput" placeholder="https://new-url.com" required />
        <p class="form-error" id="editError" ></p>
        <div class="modal-actions">
          <button type="button" class="btn-ghost" id="cancelEdit">cancel</button>
          <button type="submit" class="btn-primary" id="saveEdit">save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete confirm modal -->
  <div class="modal-backdrop hidden" id="deleteBackdrop" >
    <div class="modal modal--sm" id="deleteModal">
      <p>delete this snip?</p>
      <p class="delete-code" id="deleteCode"></p>
      <div class="modal-actions">
        <button class="btn-ghost" id="cancelDelete">cancel</button>
        <button class="btn-danger" id="confirmDelete">delete</button>
      </div>
    </div>
  </div>

  <!-- Stats modal -->
  <div class="modal-backdrop hidden" id="statsBackdrop">
    <div class="modal modal--sm" id="statsModal">
      <div class="modal-header">
        <span>stats</span>
        <button class="icon-btn" id="closeStats">✕</button>
      </div>
      <div class="stats-body" id="statsBody"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
